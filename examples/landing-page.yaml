page:
  meta:
    title: "Acme SaaS - The Future of Productivity"
    description: "Streamline your workflow with our powerful all-in-one platform"
    language: "en"
    keywords:
      - "productivity"
      - "saas"
      - "collaboration"
    
  layout:
    type: "standard"
    theme: "light"
  
  sections:
    # Navigation
    - type: navigation
      variant: default
      logo:
        text: "Acme SaaS"
        href: "/"
      links:
        - text: "Features"
          href: "#features"
        - text: "Pricing"
          href: "#pricing"
        - text: "About"
          href: "#about"
      cta:
        text: "Get Started"
        href: "#signup"
    
    # Hero Section
    - type: hero
      variant: centered
      content:
        heading: "The Future of Productivity"
        subheading: "Streamline your workflow with our powerful all-in-one platform"
        description: "Join thousands of teams who trust Acme SaaS to get more done, faster."
        cta:
          - text: "Start Free Trial"
            href: "#signup"
            variant: primary
          - text: "Watch Demo"
            href: "#demo"
            variant: outline
        image: "https://via.placeholder.com/1200x600"
    
    # Features Section
    - type: features
      variant: grid-3
      heading: "Everything you need to succeed"
      subheading: "Powerful features designed for modern teams"
      items:
        - icon: "rocket"
          title: "Lightning Fast"
          description: "Built for speed with cutting-edge technology for instant results"
        - icon: "shield"
          title: "Enterprise Security"
          description: "Bank-grade encryption and compliance with SOC 2 & GDPR"
        - icon: "users"
          title: "Team Collaboration"
          description: "Work together seamlessly with real-time sync and comments"
        - icon: "chart"
          title: "Advanced Analytics"
          description: "Get insights with powerful dashboards and reporting tools"
        - icon: "api"
          title: "API Access"
          description: "Integrate with your favorite tools via our REST API"
        - icon: "mobile"
          title: "Mobile Apps"
          description: "Native iOS and Android apps for productivity on the go"
    
    # Content Section
    - type: content
      variant: prose
      markdown: |
        ## Why Teams Choose Acme SaaS
        
        We've built the most intuitive and powerful platform for modern teams.
        With features designed for collaboration, security, and scale, Acme SaaS
        helps you focus on what matters most.
        
        ### Built for Scale
        
        Whether you're a startup or enterprise, our platform grows with you.
        Handle millions of transactions with ease.
    
    # CTA Section
    - type: cta
      variant: centered
      heading: "Ready to transform your workflow?"
      description: "Join over 10,000 companies already using Acme SaaS"
      cta:
        - text: "Start Free Trial"
          href: "#signup"
          variant: primary
        - text: "Contact Sales"
          href: "#contact"
          variant: secondary
    
    # Footer
    - type: footer
      variant: simple
      logo:
        text: "Acme SaaS"
      social:
        - platform: "twitter"
          href: "https://twitter.com/acme"
        - platform: "github"
          href: "https://github.com/acme"
        - platform: "linkedin"
          href: "https://linkedin.com/company/acme"
      copyright: "© 2026 Acme SaaS. All rights reserved."
