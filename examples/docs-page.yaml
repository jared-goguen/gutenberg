        # Getting Started
        
        Welcome to our documentation! This guide will help you get up and running
        in just a few minutes.
        
        ## Installation
        
        Install our SDK using your favorite package manager:
        
        ```bash
        npm install @acme/sdk
        # or
        yarn add @acme/sdk
        ```
        
        ## Quick Start
        
        Here's a simple example to get you started:
        
        ```javascript
        import { AcmeClient } from '@acme/sdk';
        
        const client = new AcmeClient({
          apiKey: 'your-api-key'
        });
        
        const result = await client.getData();
        console.log(result);
        ```
        
        ## Authentication
        
        All API requests require authentication. You can find your API key in the
        dashboard under Settings > API Keys.
        
        ## Next Steps
        
