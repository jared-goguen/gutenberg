# Gutenberg Semantic Axes Specification
# Defines the four orthogonal dimensions for page section semantics

version: "1.0.0"
description: "Orthogonal semantic dimensions for expressing page cohesion and narrative structure"

axes:
  vibe:
    description: "Visual and emotional energy of a section"
    type: enum
    values:
      - value: serene
        description: "Calm, peaceful, breathing room, patient. Low energy, approachable."
        affects: ["spacing", "opacity", "font-weight", "shadows"]
        
      - value: gentle
        description: "Soft, approachable, no pressure. Forgiving, easy entry point."
        affects: ["spacing", "color-intensity", "padding", "borders"]
        
      - value: steady
        description: "Balanced, professional, measured, reliable. Default energy level."
        affects: ["baseline", "normal-defaults"]
        
      - value: vibrant
        description: "Energetic, dynamic, alive, engaging. Visible presence."
        affects: ["color-saturation", "spacing-reduction", "visual-weight"]
        
      - value: intense
        description: "Powerful, focused, demanding attention. High visual force."
        affects: ["contrast", "font-size", "color-boldness", "shadows"]
        
      - value: urgent
        description: "Frenetic, time-pressure, act-now energy. Maximum intensity."
        affects: ["contrast", "animation", "visual-hierarchy", "spacing-reduction"]
    
    default: steady
    required: false
    notes: "Vibe is independent of narrative position. A hero can be serene (cool intro) or intense (dramatic entrance)."

  intent:
    description: "Rhetorical purpose and communicative goal"
    type: enum
    values:
      - value: engage
        description: "Capture attention, create emotional connection. Pathos-forward."
        use_cases: ["heroes", "testimonials", "opening sections"]
        affects: ["visual-hierarchy", "color-emphasis", "animation"]
        
      - value: inform
        description: "Convey facts, explain, clarify. Logos-forward."
        use_cases: ["features", "content", "documentation", "specs"]
        affects: ["typography-clarity", "spacing-structure", "readability"]
        
      - value: persuade
        description: "Make the case, build credibility, address objections. Ethos-forward."
        use_cases: ["testimonials", "comparisons", "case-studies", "social-proof"]
        affects: ["visual-authority", "layout-trust", "credibility-signals"]
        
      - value: direct
        description: "Guide to action, create urgency, convert. Kairos-forward."
        use_cases: ["CTAs", "next-steps", "conversions"]
        affects: ["button-prominence", "spacing-urgency", "visual-directedness"]
    
    default: inform
    required: false
    component_defaults:
      hero: engage
      cta: direct
      features: inform
      content: inform
      navigation: inform
      footer: inform

  narrative:
    description: "Position in the dramatic arc (Freytag's Pyramid)"
    type: enum
    values:
      - value: exposition
        description: "Introduces the world, establishes context, orients the reader. Act I beginning."
        position: 1
        affects: ["initial-spacing", "context-setting", "visual-freshness"]
        
      - value: inciting
        description: "The hook, the problem, the call to adventure. Inciting incident."
        position: 2
        affects: ["tension-introduction", "urgency-signal"]
        
      - value: rising
        description: "Builds tension, develops the argument, adds complications. Act II."
        position: 3
        affects: ["momentum-building", "visual-escalation"]
        
      - value: climax
        description: "Peak moment, turning point, maximum tension. Act III midpoint."
        position: 4
        affects: ["visual-peak", "maximum-emphasis", "decision-point"]
        
      - value: falling
        description: "Addresses consequences, provides proof, unwinds tension. Act IV."
        position: 5
        affects: ["reassurance-signals", "proof-presentation", "tension-release"]
        
      - value: resolution
        description: "Concludes, restores equilibrium, provides closure. Act V (dénouement)."
        position: 6
        affects: ["closure-signals", "finality-treatment", "exit-pacing"]
    
    default: rising
    required: false
    notes: "Narrative positions are composable—pages can have multiple mini-arcs, skip positions, or have extended climaxes."
    classical_reference: "Based on Gustav Freytag's 1863 analysis of dramatic structure"

  cohesion:
    description: "Relational connection to surrounding sections"
    type: enum
    values:
      - value: opens
        description: "Starts a new thread, no prior context needed. Fresh visual language."
        rendering: "generous whitespace above, new visual language"
        affects: ["top-margin", "background-change", "visual-reset"]
        
      - value: continues
        description: "Extends the previous section's idea. Visual continuity."
        rendering: "minimal separation, shared visual language, color continuity"
        affects: ["margin-reduction", "background-continuity", "typography-echo"]
        
      - value: amplifies
        description: "Intensifies/builds on previous. Connected but escalating."
        rendering: "connected but visually elevated, increased emphasis"
        affects: ["relative-scaling", "visual-intensity", "emphasis-increase"]
        
      - value: supports
        description: "Provides evidence/proof for previous. Subordinate visual treatment."
        rendering: "subordinate styling, reduced visual weight, supporting role"
        affects: ["visual-weight-reduction", "size-reduction", "subordinate-spacing"]
        
      - value: contrasts
        description: "Stands in opposition, presents counter-view. Visual break."
        rendering: "clear visual separation, different palette or treatment"
        affects: ["background-change", "color-shift", "margin-increase", "visual-reset"]
        
      - value: pivots
        description: "Changes direction, shifts topic. Clear separation and transition."
        rendering: "horizontal dividers, transitional treatment, topic shift signal"
        affects: ["separator-insertion", "background-reset", "margin-emphasis"]
        
      - value: echoes
        description: "Mirrors/recalls an earlier section. Shared visual motifs."
        rendering: "visual callbacks, shared color/pattern with referenced section"
        affects: ["color-repetition", "pattern-recall", "visual-tie-back"]
        notes: "Can optionally reference a specific section by id: `echoes: hero-section`"
        
      - value: resolves
        description: "Brings a thread to conclusion. Visual closure."
        rendering: "visual settling, closure treatment, thread completion"
        affects: ["closure-styling", "tension-release", "completion-signals"]
        
      - value: closes
        description: "Final ending, exit. Terminal visual treatment."
        rendering: "terminal flourish, exit pacing, final impression"
        affects: ["exit-treatment", "finality-signals", "goodbye-spacing"]
    
    default: continues
    required: false
    notes: "Cohesion is about relationships between sections. Renderer uses adjacent cohesion values to determine spacing, colors, and transitions."

composition_rules:
  - name: "Any combination is valid"
    description: "All 6 × 4 × 6 × 9 = 1,296 combinations are semantically valid and meaningful"
    
  - name: "Defaults maintain current behavior"
    description: "If semantic axes are omitted, sensible defaults apply (steady, informed intent, rising narrative, continues)"
    
  - name: "No invalid states"
    description: "The schema makes invalid states unrepresentable. You cannot write something semantically incoherent."
    
  - name: "Components can ignore axes"
    description: "Not all axes apply to all components (e.g., footer may ignore narrative), but axes can always be specified."

rendering_guidance:
  vibe_implementation:
    - serene: "75% opacity, increased padding, soft shadows, lighter font-weight"
    - gentle: "85% opacity, normal padding, subtle borders, light color treatment"
    - steady: "100% opacity, baseline spacing, standard shadows, standard treatment"
    - vibrant: "100% opacity, reduced margins, increased saturation, visible weight"
    - intense: "100% opacity, tight spacing, high contrast, bold font-weight"
    - urgent: "100% opacity, compact layout, animations, maximum visual hierarchy"
  
  cohesion_implementation:
    - opens: "top margin 48px+, background reset, new color context"
    - continues: "top margin 0-16px, background continuity, shared colors"
    - amplifies: "top margin 16px, scaled-up treatment of previous, emphasized"
    - supports: "top margin 24px, subordinate scaling (85%), reduced visual weight"
    - contrasts: "top margin 32px+, background shift, color change, clear break"
    - pivots: "top margin 32px+, divider line, topic-change signal"
    - echoes: "callback styling, color tie-back to referenced section"
    - resolves: "settling animation, closure treatment, wind-down pacing"
    - closes: "exit spacing, terminal treatment, final visual"

examples:
  - name: "Standard Landing Page Arc"
    sections:
      - type: hero
        vibe: vibrant
        intent: engage
        narrative: exposition
        cohesion: opens
        
      - type: features
        vibe: steady
        intent: inform
        narrative: rising
        cohesion: continues
        
      - type: cta
        vibe: intense
        intent: direct
        narrative: climax
        cohesion: pivots
        
      - type: testimonials
        vibe: gentle
        intent: persuade
        narrative: falling
        cohesion: supports
        
      - type: cta
        vibe: steady
        intent: direct
        narrative: resolution
        cohesion: resolves

  - name: "Educational Page with Multiple Threads"
    sections:
      - type: hero
        vibe: serene
        intent: engage
        narrative: exposition
        cohesion: opens
        
      - type: features
        vibe: steady
        intent: inform
        narrative: rising
        cohesion: continues
        
      - type: content
        vibe: steady
        intent: inform
        narrative: rising
        cohesion: continues
        
      - type: cta
        vibe: gentle
        intent: direct
        narrative: falling
        cohesion: amplifies
        # Note: gentle + direct creates "soft CTA" — not pushy, but clear

  - name: "Contrasting Perspectives"
    sections:
      - type: features
        vibe: vibrant
        intent: persuade
        narrative: rising
        cohesion: continues
        
      - type: content
        vibe: steady
        intent: inform
        narrative: rising
        cohesion: contrasts
        # Note: contrasts signals this is addressing objections or alternatives

notes:
  - "These axes replace the old overloaded 'tone' field entirely"
  - "All fields are optional and individually composable"
  - "Renderers interpret these axes to produce cohesive visual experiences"
  - "The model is grounded in classical narrative theory (Freytag) and rhetoric (Aristotle)"
