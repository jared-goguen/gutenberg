<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smoke Test</title>
  
  <style>
:root {
  --sky-50: oklch(0.971 0.013300000000000001 220);
  --sky-100: oklch(0.936 0.026600000000000002 220);
  --sky-200: oklch(0.885 0.0475 220);
  --sky-300: oklch(0.808 0.0855 220);
  --sky-400: oklch(0.704 0.13299999999999998 220);
  --sky-500: oklch(0.637 0.19 220);
  --sky-600: oklch(0.577 0.1805 220);
  --sky-700: oklch(0.505 0.1615 220);
  --sky-800: oklch(0.444 0.13299999999999998 220);
  --sky-900: oklch(0.396 0.10450000000000001 220);
  --sky-950: oklch(0.258 0.07600000000000001 220);
  --slate-50: oklch(0.971 0.00063 220);
  --slate-100: oklch(0.936 0.00126 220);
  --slate-200: oklch(0.885 0.00225 220);
  --slate-300: oklch(0.808 0.00405 220);
  --slate-400: oklch(0.704 0.006299999999999999 220);
  --slate-500: oklch(0.637 0.009 220);
  --slate-600: oklch(0.577 0.008549999999999999 220);
  --slate-700: oklch(0.505 0.007649999999999999 220);
  --slate-800: oklch(0.444 0.006299999999999999 220);
  --slate-900: oklch(0.396 0.00495 220);
  --slate-950: oklch(0.258 0.0036 220);
  --primary-50: var(--sky-50);
  --primary-100: var(--sky-100);
  --primary-200: var(--sky-200);
  --primary-300: var(--sky-300);
  --primary-400: var(--sky-400);
  --primary-500: var(--sky-500);
  --primary-600: var(--sky-600);
  --primary-700: var(--sky-700);
  --primary-800: var(--sky-800);
  --primary-900: var(--sky-900);
  --primary-950: var(--sky-950);
  --neutral-50: var(--slate-50);
  --neutral-100: var(--slate-100);
  --neutral-200: var(--slate-200);
  --neutral-300: var(--slate-300);
  --neutral-400: var(--slate-400);
  --neutral-500: var(--slate-500);
  --neutral-600: var(--slate-600);
  --neutral-700: var(--slate-700);
  --neutral-800: var(--slate-800);
  --neutral-900: var(--slate-900);
  --neutral-950: var(--slate-950);
  --color-primary: oklch(0.704 0.13299999999999998 220);
  --color-primary_hover: oklch(0.808 0.0855 220);
  --color-bg_page: oklch(0.258 0.0036 220);
  --color-bg_subtle: oklch(0.396 0.00495 220);
  --color-bg_inverse: oklch(100% 0 0);
  --color-text_default: oklch(0.971 0.00063 220);
  --color-text_muted: oklch(0.704 0.006299999999999999 220);
  --color-text_inverse: oklch(0.258 0.0036 220);
  --color-border: oklch(0.444 0.006299999999999999 220);
  --color-feature: oklch(0.396 0.10450000000000001 220);
}


/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { 
  line-height: 1.5; 
  -webkit-font-smoothing: antialiased; 
  scroll-behavior: smooth;
}
img { display: block; max-width: 100%; height: auto; }

/* Layout primitives */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-row { flex-direction: row; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-sm { gap: 1rem; }
.gap-md { gap: 1.5rem; }
.gap-lg { gap: 2rem; }

.grid { display: grid; }
.layout-2col { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
  gap: 2rem; 
}
@media (min-width: 768px) {
  .layout-2col { grid-template-columns: repeat(2, 1fr); }
}
.layout-3col { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 1.5rem; 
}
@media (min-width: 768px) {
  .layout-3col { grid-template-columns: repeat(3, 1fr); gap: 2rem; }
}
.layout-4col { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
  gap: 1.5rem; 
}
@media (min-width: 1024px) {
  .layout-4col { grid-template-columns: repeat(4, 1fr); }
}

/* Width constraints */
.width-full { max-width: 100%; }
.width-narrow { max-width: 42rem; margin-inline: auto; padding-inline: 1.5rem; }
.width-standard { max-width: 80rem; margin-inline: auto; padding-inline: 1.5rem; }
.width-wide { max-width: 100rem; margin-inline: auto; padding-inline: 1.5rem; }

/* Alignment */
.align-left { text-align: left; }
.align-center { text-align: center; }
.align-split { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
@media (max-width: 768px) {
  .align-split { grid-template-columns: 1fr; gap: 2rem; }
}

:root {
  --font-heading: system-ui, -apple-system, sans-serif;
  --font-body: system-ui, -apple-system, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--color-bg_page);
  color: var(--color-text_default);
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 600;
  line-height: 1.2;
}

/* Component styles */

.hero-heading {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 700;
  letter-spacing: -0.01em;
}

.hero-body {
  font-size: 1.1rem;
  color: var(--color-text_muted);
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: var(--primary-400, #60a5fa);
  border: none;
  color: var(--color-bg_page);
  padding: 0.875rem 2rem;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 0.5rem;
  text-decoration: none;
  transition: all 200ms ease;
  cursor: pointer;
}

.btn-primary:hover {
  background: var(--primary-300, #93c5fd);
  color: var(--color-bg_page);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: var(--color-bg_subtle);
  border: 1px solid var(--color-border);
  color: var(--color-text_default);
  padding: 0.75rem 1.75rem;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 0.5rem;
  text-decoration: none;
  transition: all 200ms ease;
  cursor: pointer;
}

.btn-secondary:hover {
  background: var(--color-bg_page);
  border-color: var(--primary-400, #60a5fa);
  color: var(--primary-400, #60a5fa);
}

.feature-card {
  padding: 2rem;
  border-radius: 0.75rem;
  background: var(--color-bg_subtle);
  border: 1px solid var(--color-border);
  box-shadow: 0 1px 3px rgb(0 0 0 / 0.3);
  transition: all 200ms ease;
}

.feature-card:hover {
  border-color: var(--primary-400, #60a5fa);
  box-shadow: 0 4px 12px rgb(0 0 0 / 0.4);
}

.feature-icon {
  font-size: 2rem;
  color: var(--primary-400, #60a5fa);
  margin-bottom: 1rem;
}

.feature-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.feature-body {
  font-size: 0.95rem;
  color: var(--color-text_muted);
}

.feature-link {
  color: var(--primary-400, #60a5fa);
  text-decoration: none;
  border-bottom: 1px solid currentColor;
  transition: opacity 200ms ease;
}

.feature-link:hover {
  opacity: 0.8;
}

.btn-outline {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: transparent;
  border: 2px solid var(--primary-400, #60a5fa);
  color: var(--primary-400, #60a5fa);
  padding: 0.875rem 2rem;
  font-family: var(--font-body);
  font-size: 0.875rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-decoration: none;
  transition: all 200ms ease;
  cursor: pointer;
}

.btn-outline:hover {
  background: var(--primary-400, #60a5fa);
  color: var(--color-bg_page);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: transparent;
  border: none;
  color: var(--primary-400, #60a5fa);
  padding: 0.75rem 1.5rem;
  font-family: var(--font-body);
  font-size: 0.875rem;
  font-weight: 500;
  text-decoration: none;
  transition: opacity 200ms ease;
  cursor: pointer;
}

.btn-ghost:hover {
  opacity: 0.8;
}

.cta-heading {
  font-size: clamp(1.875rem, 4vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 1.5rem;
  color: var(--primary-400, #60a5fa);
}

.cta-body {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--color-text_muted);
  margin-bottom: 2rem;
}

.hero-image {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 0.5rem;
  border: 1px solid var(--color-border);
}

.footer-logo {
  font-size: 1.25rem;
  font-weight: 700;
  text-decoration: none;
  color: var(--primary-400, #60a5fa);
  display: inline-block;
}

.nav-root {
  border-bottom: 1px solid var(--color-border);
  padding: 1rem 0;
  background: var(--color-bg_page);
}

.nav-logo {
  font-size: 1.25rem;
  font-weight: 700;
  text-decoration: none;
  color: var(--primary-400, #60a5fa);
}

.nav-link {
  color: var(--color-text_default);
  text-decoration: none;
  font-weight: 500;
  transition: color 200ms ease;
}

.nav-link:hover {
  color: var(--primary-400, #60a5fa);
}

.footer-root {
  border-top: 1px solid var(--color-border);
  padding-top: 3rem;
  padding-bottom: 2rem;
  background: var(--color-bg_page);
}

.footer-link {
  color: var(--color-text_default);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color 200ms ease;
}

.footer-link:hover {
  color: var(--primary-400, #60a5fa);
}

.footer-copy {
  color: var(--color-text_muted);
  font-size: 0.85rem;
  text-align: center;
  border-top: 1px solid var(--color-border);
  padding-top: 2rem;
  margin-top: 2rem;
}

/* Semantic axes */
.vibe-serene { padding-block: 6rem; }
.vibe-gentle { padding-block: 5rem; }
.vibe-steady { padding-block: 4rem; }
.vibe-vibrant { padding-block: 3rem; }
.vibe-intense { padding-block: 2rem; }
.vibe-urgent { padding-block: 1.5rem; }

.intent-engage .btn-primary { background: var(--primary-300, #93c5fd); }
.intent-direct .btn-primary { font-weight: 700; }

.narrative-climax .hero-heading { font-weight: 800; }

.cohesion-amplifies { margin-top: 0; border-top: 1px solid var(--color-border); padding-top: 3rem; }
.cohesion-contrasts { margin-top: 0; background: var(--color-bg_inverse); color: var(--color-text_inverse); padding-block: 4rem; }
.cohesion-contrasts .hero-heading { color: var(--color-text_inverse); }
.cohesion-contrasts .btn-primary { background: var(--color-text_inverse); color: var(--color-bg_inverse); }
  </style>
</head>
<body>
<section class="vibe-steady intent-inform narrative-rising cohesion-continues">
    <div class="width-narrow align-center">
    <h1 class="hero-heading">Smoke Test</h1>
    <p class="hero-body">All tools working</p>
  </div>
</section>
</body>
</html>
